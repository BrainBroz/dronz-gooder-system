name: Quality gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, types, build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dronz_gooder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dronz_gooder_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/dronz_gooder_test?schema=public
      SEED_ADMIN_NAME: Test Admin
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: change-me
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Check formatting errors in the diff
        run: git diff --check HEAD^ HEAD

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
